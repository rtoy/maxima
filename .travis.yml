# Travis CI for maxima.
# View build status at http://travis-ci.org/rtoy/maxima/builds
#
# Install packages we need
before_install:
 - sudo apt-get install -y texinfo lib32gcc-4.8-dev gnuplot

# Get lisp binary to use
install:
 - curl --location https://github.com/Clozure/ccl/releases/download/v1.11.5/ccl-1.11.5-linuxx86.tar.gz | tar xzf -
 - mkdir cmucl
 - (cd cmucl; curl https://common-lisp.net/project/cmucl/downloads/snapshots/2018/03/cmucl-2018-03-x86-linux.tar.bz2 | tar xjf -)
 - (cd cmucl; curl https://common-lisp.net/project/cmucl/downloads/snapshots/2018/03/cmucl-2018-03-x86-linux.extra.tar.bz2 | tar xjf -)
 - curl https://common-lisp.net/project/ecl/static/files/release/ecl-16.1.3.tgz | tar xzf -
 - (cd ecl-16.1.3; ./configure && make && make install)

# Build and run layout tests
script:
 - ./bootstrap
 - ./configure --enable-ccl64 --with-ccl64=$PWD/ccl/lx86cl64 --enable-cmucl --with-cmucl=$PWD/cmucl/bin/lisp --enable-ecl --with-ecl=/usr/local/bin/ecl
 - make
 - (make check; cat tests/test-suite.log)
