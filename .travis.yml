# Travis CI for maxima.
# View build status at http://travis-ci.org/rtoy/maxima/builds
#
# Install packages we need
before_install:
 - sudo apt-get install -y texinfo

# Get lisp binary to use
install:
 - curl --location https://github.com/Clozure/ccl/releases/download/v1.11.5/ccl-1.11.5-linuxx86.tar.gz | tar xzf -

# Build and run layout tests
script:
 - ./bootstrap
 - ./configure --enable-ccl64 --with-ccl64=$PWD/ccl/lx86cl64
 - make
 - (make check; cat tests/test-suite.log)
